<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Animation Specimens — 日替わりアニメーション標本箱</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1a1a1a;
    --ink-soft:#6b6b6b;
    --line:#e4e2dc;
    --paper:#ffffff;
    --paper-2:#faf9f6;
    --accent:#1a1a1a;
    --sans:'Inter',system-ui,sans-serif;
    --mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:var(--sans);
    color:var(--ink);
    background:var(--paper);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit}

  /* ---- layout ---- */
  .wrap{display:grid;grid-template-columns:232px 1fr;min-height:100vh}

  /* ---- sidebar ---- */
  .side{
    border-right:1px solid var(--line);
    padding:32px 24px;
    position:sticky;top:0;height:100vh;
    display:flex;flex-direction:column;
    overflow-y:auto;
  }
  .brand{margin-bottom:40px}
  .brand h1{
    font-family:var(--mono);
    font-size:15px;font-weight:700;letter-spacing:-.02em;
    line-height:1.35;
  }
  .brand .sub{
    font-size:11px;color:var(--ink-soft);margin-top:8px;
    font-family:var(--mono);letter-spacing:.02em;
  }
  .side .label{
    font-family:var(--mono);font-size:10px;font-weight:500;
    text-transform:uppercase;letter-spacing:.14em;
    color:var(--ink-soft);margin-bottom:14px;
  }
  .filters{display:flex;flex-direction:column;gap:2px;list-style:none}
  .filters button{
    all:unset;cursor:pointer;
    display:flex;justify-content:space-between;align-items:baseline;
    font-size:13px;padding:6px 8px;border-radius:5px;width:100%;
    color:var(--ink);transition:background .12s;
  }
  .filters button:hover{background:var(--paper-2)}
  .filters button[aria-current="true"]{background:var(--ink);color:#fff}
  .filters button[aria-current="true"] .n{color:rgba(255,255,255,.6)}
  .filters .n{font-family:var(--mono);font-size:11px;color:var(--ink-soft)}
  .side-foot{
    margin-top:auto;padding-top:24px;
    font-family:var(--mono);font-size:10px;line-height:1.7;
    color:var(--ink-soft);letter-spacing:.02em;
  }
  .side-foot a{text-decoration:underline;text-underline-offset:2px}

  /* ---- main ---- */
  .main{padding:40px 44px 80px}
  .main-head{
    display:flex;justify-content:space-between;align-items:baseline;
    border-bottom:1px solid var(--line);padding-bottom:16px;margin-bottom:36px;
    flex-wrap:wrap;gap:8px;
  }
  .main-head .count{font-family:var(--mono);font-size:12px;color:var(--ink-soft)}
  .main-head .today-date{font-family:var(--mono);font-size:12px;color:var(--ink-soft)}

  /* ---- specimen card ---- */
  .grid{
    display:grid;grid-template-columns:repeat(2,1fr);
    gap:1px;background:var(--line);
    border:1px solid var(--line);
  }
  .card{
    background:var(--paper);padding:14px 14px 16px;
    display:flex;flex-direction:column;gap:10px;
    position:relative;
  }
  .card.today{grid-column:1 / -1;flex-direction:row;align-items:flex-start;gap:28px;padding:24px}
  .card.today .stage-holder{flex-shrink:0}
  .card.today .meta{flex:1;padding-top:4px}

  .badge{
    position:absolute;top:0;left:0;z-index:3;
    font-family:var(--mono);font-size:9px;font-weight:700;
    letter-spacing:.12em;text-transform:uppercase;
    background:var(--ink);color:#fff;padding:4px 9px;
  }
  .card.today .badge{font-size:10px;padding:5px 11px}

  .stage-holder{
    display:flex;align-items:center;justify-content:center;
    background:var(--paper-2);
    border:1px solid var(--line);
    width:100%;height:168px;overflow:hidden;
    position:relative;
  }
  .card.today .stage-holder{width:220px;height:200px}
  /* the injected .demo-stage (200x200) scaled to fit landscape stage */
  .card:not(.today) .demo-stage{transform:scale(.72);transform-origin:center}
  .card.today .demo-stage{transform:scale(.92);transform-origin:center}

  /* ---- code / preview toggle ---- */
  .view-toggle{
    all:unset;cursor:pointer;position:absolute;top:8px;right:8px;z-index:4;
    font-family:var(--mono);font-size:9px;letter-spacing:.05em;
    color:var(--ink-soft);background:rgba(255,255,255,.9);
    border:1px solid var(--line);border-radius:3px;padding:3px 7px;
    transition:all .12s;
  }
  .view-toggle:hover{color:var(--ink);border-color:var(--ink)}
  .card.show-code .view-toggle{background:var(--ink);color:#fff;border-color:var(--ink)}
  .code-view{
    display:none;position:absolute;inset:0;z-index:2;
    background:var(--paper-2);
    font-family:var(--mono);font-size:10px;line-height:1.6;
    color:var(--ink);padding:12px 14px;margin:0;
    overflow:auto;white-space:pre-wrap;word-break:break-all;
    -webkit-overflow-scrolling:touch;
  }
  .card.show-code .code-view{display:block}
  .code-view .cm{color:var(--ink-soft)}

  .meta .idx{
    font-family:var(--mono);font-size:10px;color:var(--ink-soft);
    letter-spacing:.06em;margin-bottom:4px;
  }
  .meta h2{font-size:14px;font-weight:600;letter-spacing:-.01em;margin-bottom:2px}
  .card.today .meta h2{font-size:24px;line-height:1.15;margin-bottom:8px}
  .meta .theme{
    font-family:var(--mono);font-size:10px;color:var(--ink-soft);
    display:inline-block;
  }
  .card.today .meta .theme{font-size:12px}
  .meta .dateline{
    font-family:var(--mono);font-size:11px;color:var(--ink-soft);margin-top:4px;
  }
  .card.today .lead{
    font-size:12px;color:var(--ink-soft);margin-top:12px;max-width:40ch;line-height:1.6;
  }

  /* archive cards: pause animation until hover/focus for performance */
  .card:not(.today) .demo-stage,
  .card:not(.today) .demo-stage *{animation-play-state:paused !important}
  .card:not(.today):hover .demo-stage,
  .card:not(.today):hover .demo-stage *,
  .card:not(.today):focus-within .demo-stage,
  .card:not(.today):focus-within .demo-stage *{animation-play-state:running !important}
  .card:not(.today){cursor:pointer}
  .card:not(.today) .stage-holder::after{
    content:'▶ play';position:absolute;bottom:6px;right:6px;z-index:1;
    font-family:var(--mono);font-size:9px;color:var(--ink-soft);
    background:rgba(255,255,255,.82);padding:2px 5px;border-radius:3px;
    opacity:0;transition:opacity .15s;pointer-events:none;
  }
  .card:not(.today):not(:hover):not(.show-code) .stage-holder::after{opacity:.85}

  .loading{padding:80px 44px;font-family:var(--mono);font-size:13px;color:var(--ink-soft)}
  .empty{padding:60px 0;font-family:var(--mono);font-size:13px;color:var(--ink-soft)}

  /* ---- responsive ---- */
  @media(max-width:720px){
    .wrap{grid-template-columns:1fr}
    .side{position:static;height:auto;border-right:none;border-bottom:1px solid var(--line);
      flex-direction:column}
    .side-foot{margin-top:24px}
    .main{padding:24px 16px 60px}
    .card.today{flex-direction:column;align-items:stretch;gap:14px;padding:16px}
    .card.today .stage-holder{width:100%;height:180px}
    .grid{grid-template-columns:1fr}
  }
  @media(prefers-reduced-motion:reduce){
    *{animation:none !important}
  }
</style>
</head>
<body>
<div class="wrap">
  <aside class="side">
    <div class="brand">
      <h1>Daily Animation<br>Specimens</h1>
      <div class="sub">日替わり標本箱</div>
    </div>
    <div class="label">Themes</div>
    <ul class="filters" id="filters"></ul>
    <div class="side-foot">
      毎晩 00:00、Claude が<br>その日のテーマで CSS<br>アニメーションを 1 つ生成。<br><br>
      <a id="repo-link" href="#" target="_blank" rel="noopener">source on github ↗</a>
    </div>
  </aside>

  <main class="main">
    <div class="main-head">
      <div class="count" id="count">— specimens</div>
      <div class="today-date" id="today-date"></div>
    </div>
    <div id="content"><div class="loading">Loading specimens…</div></div>
  </main>
</div>

<script>
// ==== CONFIG: 自分の環境に合わせてここだけ変える ====
const GITHUB_USER = 'saku0875';
const REPO        = 'animation-gallery';
const BRANCH      = 'main';
const DATA_PATH   = 'data/animations.json';
// ローカル確認用: sample.json があればそちらを優先
const LOCAL_SAMPLE = 'sample.json';
// ====================================================

const RAW_URL = `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO}/${BRANCH}/${DATA_PATH}`;
document.getElementById('repo-link').href = `https://github.com/${GITHUB_USER}/${REPO}`;

let ALL = [];
let activeTheme = null;

function escapeAttr(s){return String(s||'');}

async function load(){
  let data = null;
  // まずローカルsample、失敗したらGitHub raw
  for(const url of [LOCAL_SAMPLE, RAW_URL]){
    try{
      const res = await fetch(url, {cache:'no-store'});
      if(res.ok){ data = await res.json(); break; }
    }catch(e){/* try next */}
  }
  if(!data){
    document.getElementById('content').innerHTML =
      '<div class="empty">まだ標本がありません。最初のアニメーションが生成されるのをお待ちください。</div>';
    return;
  }
  // 新しい順（date降順）に整列
  ALL = data.slice().sort((a,b)=> (a.date<b.date?1:a.date>b.date?-1:0));
  buildFilters();
  render();
}

function buildFilters(){
  const counts = {};
  ALL.forEach(a=>{counts[a.theme]=(counts[a.theme]||0)+1});
  const themes = Object.keys(counts).sort((a,b)=>counts[b]-counts[a]);
  const ul = document.getElementById('filters');
  ul.innerHTML='';
  const mk=(label,theme,n)=>{
    const li=document.createElement('li');
    const btn=document.createElement('button');
    btn.setAttribute('aria-current', theme===activeTheme ? 'true':'false');
    btn.innerHTML=`<span>${label}</span><span class="n">${n}</span>`;
    btn.onclick=()=>{activeTheme = (theme===activeTheme?null:theme); buildFilters(); render();};
    li.appendChild(btn); return li;
  };
  ul.appendChild(mk('すべて', null, ALL.length));
  themes.forEach(t=> ul.appendChild(mk(t, t, counts[t])));
}

function injectStyle(css, scopeId){
  // 各作品の .demo-stage を固有ID配下にスコープして衝突を防ぐ
  const scoped = css.replace(/\.demo-stage/g, `#${scopeId} .demo-stage`);
  const el=document.createElement('style');
  el.textContent=scoped;
  document.head.appendChild(el);
}

function escapeHtml(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function codeBlock(item){
  return `<span class="cm">/* CSS */</span>\n${escapeHtml(item.keyframes_css)}\n\n<span class="cm">&lt;!-- HTML --&gt;</span>\n${escapeHtml(item.demo_html)}`;
}

function stageMarkup(item, scopeId){
  // demo_html を .demo-stage で包み、指定スコープIDでラップ
  return {id:scopeId, html:`<div id="${scopeId}"><div class="demo-stage">${item.demo_html}</div></div>`};
}

function render(){
  const list = activeTheme ? ALL.filter(a=>a.theme===activeTheme) : ALL;
  const content=document.getElementById('content');

  document.getElementById('count').textContent = `${ALL.length} specimens`;
  if(ALL[0]) document.getElementById('today-date').textContent = `latest: ${ALL[0].date}`;

  if(list.length===0){content.innerHTML='<div class="empty">該当なし</div>';return;}

  // 古いstyleタグ掃除（再描画時の重複防止）
  document.querySelectorAll('style[data-specimen]').forEach(e=>e.remove());

  const today = list[0];
  const rest = list.slice(1);
  let html = '<div class="grid">';

  // --- today card ---
  {
    const {id,html:stage} = stageMarkup(today, 'today');
    html += `<article class="card today">
      <span class="badge">Today ◍</span>
      <div class="stage-holder">
        ${stage}
        <pre class="code-view">${codeBlock(today)}</pre>
        <button class="view-toggle" type="button">&lt;/&gt; code</button>
      </div>
      <div class="meta">
        <div class="idx">No.${String(ALL.length).padStart(3,'0')} / ${today.date}</div>
        <h2>${today.title||today.theme}</h2>
        <span class="theme">theme — ${today.theme}</span>
        <p class="lead">本日の標本。Claude がテーマ「${today.theme}」から生成した CSS アニメーションです。</p>
      </div>
    </article>`;
  }

  // --- archive cards ---
  rest.forEach((item,idx)=>{
    const {id,html:stage} = stageMarkup(item, `sp-${idx}`);
    html += `<article class="card" tabindex="0">
      <div class="stage-holder">
        ${stage}
        <pre class="code-view">${codeBlock(item)}</pre>
        <button class="view-toggle" type="button">&lt;/&gt;</button>
      </div>
      <div class="meta">
        <div class="idx">${item.date}</div>
        <h2>${item.title||item.theme}</h2>
        <span class="theme">theme — ${item.theme}</span>
      </div>
    </article>`;
  });

  html += '</div>';
  content.innerHTML = html;

  // スタイル注入（today = 'today', archive = index）
  injectAll(today, rest);

  // code/preview トグル（イベント委任）
  content.querySelectorAll('.view-toggle').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      e.stopPropagation();
      const card = btn.closest('.card');
      card.classList.toggle('show-code');
      const isCode = card.classList.contains('show-code');
      btn.innerHTML = isCode ? '◍ preview' : (card.classList.contains('today') ? '&lt;/&gt; code' : '&lt;/&gt;');
    });
  });
}

function injectAll(today, rest){
  const style=document.createElement('style');
  style.setAttribute('data-specimen','1');
  let css = today.keyframes_css.replace(/\.demo-stage/g, '#today .demo-stage') + '\n';
  rest.forEach((item,idx)=>{
    css += item.keyframes_css.replace(/\.demo-stage/g, `#sp-${idx} .demo-stage`) + '\n';
  });
  style.textContent=css;
  document.head.appendChild(style);
}

load();
</script>
</body>
</html>
